server:
  port: 8080

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        # Route to Metadata Service for all business logic
        - id: metadata-service
          uri: ${METADATA_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**, /api/v1/users/**, /api/v1/folders/**, /api/v1/files/**, /api/v1/shares/**, /api/v1/search/**, /api/v1/dashboards/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@ipKeyResolver}"

        # Route to Storage Nodes for direct file uploads/downloads via chunk transfers
        - id: storage-node-1
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/storage/node1/**
          filters:
            - StripPrefix=4
        - id: storage-node-2
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/storage/node2/**
          filters:
            - StripPrefix=4
        - id: storage-node-3
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/storage/node3/**
          filters:
            - StripPrefix=4
        - id: storage-node-4
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/storage/node4/**
          filters:
            - StripPrefix=4

