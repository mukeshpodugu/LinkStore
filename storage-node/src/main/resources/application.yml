server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: storage-node
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

storage:
  node-id: ${NODE_ID:storage-node-1}
  directory: ${STORAGE_DIR:./data/node1}
